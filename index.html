<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>經典貪食蛇：五關挑戰賽</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e24;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        h1 {
            margin-top: 20px;
            margin-bottom: 10px;
            color: #4caf50;
            text-shadow: 0 0 10px rgba(76, 175, 80, 0.3);
            font-size: 28px;
        }

        #game-container {
            display: flex;
            gap: 20px;
            background-color: #2a2a35;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 100%;
            box-sizing: border-box;
        }

        #panel-left {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #info-board {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            width: 400px;
            margin-bottom: 15px;
            background: #333344;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
        }

        .highlight {
            color: #ffeb3b;
            font-weight: bold;
        }

        canvas {
            background-color: #111116;
            border: 4px solid #444454;
            border-radius: 8px;
        }

        #panel-right {
            width: 220px;
            display: flex;
            flex-direction: column;
            background: #333344;
            padding: 15px;
            border-radius: 8px;
            box-sizing: border-box;
        }

        h3 {
            margin-top: 0;
            border-bottom: 2px solid #4caf50;
            padding-bottom: 5px;
            color: #4caf50;
            text-align: center;
        }

        ol {
            padding-left: 25px;
            margin: 0 0 15px 0;
            flex-grow: 1;
        }

        li {
            margin-bottom: 8px;
            font-size: 15px;
        }

        .controls-hint {
            font-size: 13px;
            color: #aaa;
            text-align: center;
            line-height: 1.5;
            background: #222230;
            padding: 10px;
            border-radius: 5px;
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #modal {
            background: #2a2a35;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            border: 2px solid #4caf50;
            max-width: 400px;
            width: 90%;
        }

        #modal h2 {
            margin-top: 0;
            color: #4caf50;
        }

        #modal p {
            font-size: 18px;
            margin: 15px 0;
        }

        input[type="text"] {
            padding: 10px;
            width: 80%;
            border-radius: 4px;
            border: 1px solid #666;
            background: #111;
            color: #fff;
            font-size: 16px;
            text-align: center;
            margin-bottom: 15px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: #4caf50;
        }

        button {
            padding: 10px 25px;
            font-size: 16px;
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
            font-weight: bold;
        }

        button:hover {
            background-color: #45a049;
        }

        @media (max-width: 700px) {
            #game-container {
                flex-direction: column;
                align-items: center;
            }
            #info-board {
                width: 100%;
                max-width: 400px;
            }
            #panel-right {
                width: 100%;
                max-width: 400px;
            }
        }
    </style>
</head>
<body>

    <h1>貪食蛇：五關挑戰賽</h1>

    <div id="game-container">
        <div id="panel-left">
            <div id="info-board">
                <div class="info-item">關卡: <span id="lbl-level" class="highlight">1</span></div>
                <div class="info-item">目標寶石: <span id="lbl-target" class="highlight">5</span></div>
                <div class="info-item">目前得分: <span id="lbl-score" class="highlight">0</span></div>
                <div class="info-item">遊戲時間: <span id="lbl-time" class="highlight">0s</span></div>
            </div>
            <canvas id="gameCanvas" width="400" height="400"></canvas>
        </div>

        <div id="panel-right">
            <h3>🏆 前五名排行</h3>
            <ol id="leaderboard-list"></ol>
            <div class="controls-hint">
                <strong>操作說明</strong><br>
                使用鍵盤方向鍵 (↑ ↓ ← →)<br>
                或 WASD 鍵控制方向。<br><br>
                撞到牆壁或自己即遊戲結束！
            </div>
        </div>
    </div>

    <div id="overlay">
        <div id="modal">
            <h2 id="modal-title">遊戲開始</h2>
            <p id="modal-desc">準備好接受 5 個關卡的挑戰了嗎？</p>
            <div id="input-container" style="display:none;">
                <input type="text" id="player-name" placeholder="請輸入您的名字" maxlength="10">
            </div>
            <button id="modal-btn" onclick="handleModalAction()">開始遊戲</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [];
        let food = { x: 0, y: 0 };
        let dx = gridSize; 
        let dy = 0;
        let score = 0;
        let level = 1;
        let caughtGems = 0; 
        
        let totalSeconds = 0;
        let gameTimerInterval = null;
        let gameLoopInterval = null;

        const levelSettings = {
            1: { target: 5, speed: 120 },
            2: { target: 8, speed: 100 },
            3: { target: 12, speed: 85 },
            4: { target: 15, speed: 70 },
            5: { target: 20, speed: 55 }
        };

        let currentModalState = "START"; 

        window.onload = function() {
            loadLeaderboard();
            showModal("START");
        };

        document.addEventListener("keydown", changeDirection);

        window.addEventListener("keydown", function(e) {
            if([37, 38, 39, 40].indexOf(e.keyCode) > -1) {
                e.preventDefault();
            }
        }, false);

        function changeDirection(event) {
            const keyPressed = event.keyCode;
            const KEY_UP = 38, KEY_DOWN = 40, KEY_LEFT = 37, KEY_RIGHT = 39;
            const KEY_W = 87, KEY_S = 83, KEY_A = 65, KEY_D = 68;

            const goingUp = dy === -gridSize;
            const goingDown = dy === gridSize;
            const goingRight = dx === gridSize;
            const goingLeft = dx === -gridSize;

            if ((keyPressed === KEY_LEFT || keyPressed === KEY_A) && !goingRight) {
                dx = -gridSize; dy = 0;
            }
            if ((keyPressed === KEY_UP || keyPressed === KEY_W) && !goingDown) {
                dx = 0; dy = -gridSize;
            }
            if ((keyPressed === KEY_RIGHT || keyPressed === KEY_D) && !goingLeft) {
                dx = gridSize; dy = 0;
            }
            if ((keyPressed === KEY_DOWN || keyPressed === KEY_S) && !goingUp) {
                dx = 0; dy = gridSize;
            }
        }

        function mainLoop() {
            if (hasGameEnded()) {
                endGame();
                return;
            }

            clearCanvas();
            drawFood();
            moveSnake();
            drawSnake();
        }

        function clearCanvas() {
            ctx.fillStyle = "#111116";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = "#191922";
            ctx.lineWidth = 1;
            for(let i=0; i<tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i*gridSize, 0);
                ctx.lineTo(i*gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i*gridSize);
                ctx.lineTo(canvas.width, i*gridSize);
                ctx.stroke();
            }
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                ctx.fillStyle = index === 0 ? "#66bb6a" : "#4caf50";
                ctx.strokeStyle = "#111116";
                ctx.lineWidth = 2;
                
                ctx.fillRect(part.x, part.y, gridSize, gridSize);
                ctx.strokeRect(part.x, part.y, gridSize, gridSize);
                
                if(index === 0) {
                    ctx.fillStyle = "#fff";
                    ctx.fillRect(part.x + 4, part.y + 4, 4, 4);
                    ctx.fillRect(part.x + 12, part.y + 4, 4, 4);
                }
            });
        }

        function moveSnake() {
            if (snake.length === 0) return;
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);

            const hasEatenFood = snake[0].x === food.x && snake[0].y === food.y;
